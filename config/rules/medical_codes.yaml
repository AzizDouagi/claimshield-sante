  thresholds:
    min_similarity_score: 0.80
    keyword_match_min_words: 2
    max_synonyms_per_code: 15
    preauth_amount_threshold_usd: 3000

  result_codes:
    - PASS
    - NEEDS_REVIEW
    - FAIL

  status: active

rules:
  - id: MEDICAL_CODE_EXACT_MATCH
    enabled: true
    severity: blocking
    description: >
      Le code ou le libellé soumis correspond exactement à une entrée active
      du référentiel local (SNOMED-CT ou RxNorm). La correspondance est
      déterministe : code exact OU libellé normalisé exact OU synonyme autorisé.
      Retourne le code canonique et le libellé normalisé sans revue humaine.

  - id: MEDICAL_CODE_KEYWORD_MATCH_REVIEW
    enabled: true
    severity: review
    description: >
      Le libellé soumis partage des mots-clés avec une ou plusieurs catégories
      du référentiel mais ne correspond à aucun code ou synonyme exact.
      Résultat approximatif — revue humaine recommandée avant facturation.
      Score minimum requis : min_similarity_score (paramètre thresholds).

  - id: MEDICAL_CODE_UNKNOWN_REVIEW
    enabled: true
    severity: review
    description: >
      Le code ou libellé soumis ne correspond à aucune entrée du référentiel,
      ni par correspondance exacte ni par mots-clés. Inclut les codes inactifs
      (active=false). Revue humaine obligatoire — facturation bloquée jusqu'à
      validation manuelle.
