ruleset:
  name: medical-codes
  version: 1.1.0
  effective_from: '2026-01-01'
  description: >
    Référentiel synthétique versionné des actes médicaux (SNOMED-CT) et
    médicaments (RxNorm) utilisés dans ClaimShield Santé. Fondé sur les
    6 dossiers de démonstration Synthea (CLM-0001 à CLM-0006). Chaque
    entrée déclare un libellé normalisé, des synonymes autorisés, des
    exclusions éventuelles de co-facturation, le statut actif/inactif et
    l'obligation éventuelle de préautorisation.

    Contraintes d'intégrité (vérifiées par le medical_coding_agent) :
      - codes et libellés uniques dans le catalogue ;
      - code et label obligatoires et non vides ;
      - les exclusions ne référencent que des codes présents dans le catalogue ;
      - seuls les codes actifs sont éligibles à la facturation directe.

  parameters:
    code_systems:
      - SNOMED-CT
      - RxNorm

    # ── Catalogue des codes ───────────────────────────────────────────────────
    # Champ          | Type              | Obligatoire
    # ───────────────|───────────────────|───────────
    # code           | str (non vide)    | oui
    # label          | str (non vide)    | oui
    # system         | SNOMED-CT|RxNorm  | oui
    # category       | str               | oui
    # synonyms       | list[str]         | oui (peut être vide)
    # exclusions     | list[code str]    | oui (peut être vide)
    # active         | bool              | oui
    # preauth_required | bool            | oui

    codes:

      # ── Actes dentaires (SNOMED-CT) ── CLM-0001, CLM-0002, CLM-0006 ─────────

      - code: "34043003"
        label: "Consultation dentaire et rapport"
